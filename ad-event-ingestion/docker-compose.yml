services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgres://ads:ads@postgres:5432/ads?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      HTTP_ADDR: ":8080"
      WORKERS: "${WORKERS:-10}"
      BATCH_SIZE: "${BATCH_SIZE:-100}"
      RATE_RPS: "${RATE_RPS:-100}"
      RATE_BURST: "${RATE_BURST:-200}"
      RATE_IDLE_TTL_SEC: "${RATE_IDLE_TTL_SEC:-600}"   # evict idle per-IP limiters after 10m
      USE_ROLLUPS: "${USE_ROLLUPS:-true}"              # read metrics from hourly rollup table
      ROLLUP_REFRESH_SEC: "${ROLLUP_REFRESH_SEC:-60}"  # refresh rollups every minute
      REQUIRE_USER_ID_FOR_CONVERSION: "${REQUIRE_USER_ID_FOR_CONVERSION:-false}"
      # Comma-separated browser origins allowed to call the API (the dashboard).
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ads
      POSTGRES_PASSWORD: ads
      POSTGRES_DB: ads
    ports:
      - "5432:5432"
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ads -d ads"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
